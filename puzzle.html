<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Восстановление файла...</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        h2 {
            margin-bottom: 5px;
            color: #58a6ff;
            text-align: center;
        }
        p {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 20px;
            text-align: center;
        }
        /* Игровое поле */
        #puzzle-board {
            width: 320px;
            height: 320px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            background-color: #30363d;
            border: 3px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        /* Деталька пазла */
        .piece {
            width: 100%;
            height: 100%;
            background-image: url('qr.png');
            background-size: 320px 320px;
            cursor: pointer;
            border-radius: 2px;
            transition: transform 0.1s, border-color 0.1s;
        }
        .piece.selected {
            outline: 3px solid #f2994a;
            z-index: 10;
            transform: scale(0.95);
        }
        /* Экран победы */
        #status-msg {
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
            height: 24px;
        }
        .win-text {
            color: #3fb950;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <h2>🧩 Поврежденный QR-код</h2>
    <p>Восстанови матрицу (4x4). Нажимай на кусочки, чтобы менять их местами.</p>

    <div id="puzzle-board"></div>
    <div id="status-msg"></div>

    <script>
        const GRID_SIZE = 4; // 4x4 = 16 кусочков
        const BOARD_SIZE = 320; // размер поля в px
        const PIECE_SIZE = BOARD_SIZE / GRID_SIZE;

        const board = document.getElementById('puzzle-board');
        const statusMsg = document.getElementById('status-msg');

        let pieces = [];
        let selectedPieceIndex = null;
        let isSolved = false;

        // Создаем правильный порядок [0, 1, 2 ... 15]
        let currentOrder = Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => i);

        // Функция перемешивания (так, чтобы пазл не был собран сразу)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            // Перемешиваем
            do {
                shuffle(currentOrder);
            } while (checkWin()); // Убеждаемся, что случайно не собралось сразу

            renderBoard();
        }

        function renderBoard() {
            board.innerHTML = '';

            currentOrder.forEach((originalIndex, currentIndex) => {
                const piece = document.createElement('div');
                piece.classList.add('piece');

                // Считываем X и Y позиции из правильного оригинального индекса
                const row = Math.floor(originalIndex / GRID_SIZE);
                const col = originalIndex % GRID_SIZE;

                // Вырезаем нужный кусок из картинки qr.png
                piece.style.backgroundPosition = `-${col * PIECE_SIZE}px -${row * PIECE_SIZE}px`;

                if (selectedPieceIndex === currentIndex) {
                    piece.classList.add('selected');
                }

                piece.addEventListener('click', () => handlePieceClick(currentIndex));
                board.appendChild(piece);
            });
        }

        function handlePieceClick(index) {
            if (isSolved) return;

            if (selectedPieceIndex === null) {
                // Первый клик — выбираем деталь
                selectedPieceIndex = index;
            } else if (selectedPieceIndex === index) {
                // Клик по той же детали — отменяем выбор
                selectedPieceIndex = null;
            } else {
                // Второй клик — меняем детали местами!
                [currentOrder[selectedPieceIndex], currentOrder[index]] =
                [currentOrder[index], currentOrder[selectedPieceIndex]];

                selectedPieceIndex = null;

                // Проверяем на победу
                if (checkWin()) {
                    isSolved = true;
                    statusMsg.innerHTML = '<span class="win-text">✅ QR-КОД ВОССТАНОВЛЕН! Сканируй телефон!</span>';
                    board.style.borderColor = '#3fb950';
                    board.style.gap = '0px'; // Убираем зазоры для идеального скана
                }
            }
            renderBoard();
        }

        function checkWin() {
            return currentOrder.every((val, index) => val === index);
        }

        // Старт
        initGame();
    </script>
</body>
</html>
